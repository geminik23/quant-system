# Market Data Service Configuration

[ctrader]
# cTrader FIX connection settings
sendercompid = "demo.ctrader.12345"
server = "demo.ctrader.com"
username = "12345"
password = "your_password"
ssl = false

# Market Data Service settings (xrpc shared memory)
[market_data]
shm_name = "market-data"
shm_buffer_size = 4194304  # 4MB per client

# Logging configuration
[logging]
level = "info"
